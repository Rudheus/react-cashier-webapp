version: '3.8'

services:
  database:
    image: postgres:15
    environment:
      POSTGRES_DB: cashier_db
      POSTGRES_USER: cashier_user
      POSTGRES_PASSWORD: cashier
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: cashier_db
      DB_USER: cashier_user
      DB_PASSWORD: cashier
      JWT_SECRET: caferahmankasirapp2024secretkey
    depends_on:
      - database

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
